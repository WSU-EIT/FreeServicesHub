# FreeServices — Pipeline Variables
# These mirror the TestSettings section in FreeServices.TestMe/appsettings.json.
# The pipeline injects these values into appsettings.json via FileTransform@2.
#
# Naming convention: Variable names use dot notation matching the JSON path.
# Example: TestSettings.Heartbeats → { "TestSettings": { "Heartbeats": 3 } }
# FileTransform@2 does case-insensitive matching, but we match case for clarity.

variables:

  # ── Build ──
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'

  # ── Test Settings (injected into appsettings.json via FileTransform@2) ──

  # Which test to run: 0 = all, 1 = console mode, 2 = platform service mode
  TestSettings.Test: 0

  # Number of heartbeat iterations to capture before declaring success
  TestSettings.Heartbeats: 3

  # Seconds between service heartbeat iterations
  TestSettings.Interval: 2

  # Max seconds to wait for heartbeats before timing out
  TestSettings.Timeout: 60

  # Build configuration passed to TestMe (should match buildConfiguration above)
  TestSettings.BuildConfiguration: 'Release'

  # Service project directory override (empty = auto-detect)
  TestSettings.ServiceProjectDir: ''
