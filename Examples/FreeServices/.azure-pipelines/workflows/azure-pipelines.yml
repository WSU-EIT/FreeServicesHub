# FreeServices — Azure DevOps CI Pipeline
#
# Stage 1 — Build & Publish:
#   Three parallel jobs publish win-x64 self-contained binaries and upload
#   them as pipeline artifacts (Installer.zip, Service.zip, TestMe.zip).
#
# Stage 2 — Test (from source, then from pre-built artifacts):
#   Pass A: Build from source and run tests 1/3/4 via dotnet run.
#   Pass B: Download pre-built artifacts, run TestMe.exe against the
#           shipped Installer + Service binaries (no recompile).
#   All test output is tee'd to log files and uploaded as TestLogs.
#
# Stage 3 — Deploy (optional environments):
#   Downloads artifacts from Stage 1 (no recompile). Deploys to Dev,
#   Cms, and Prod environments. Prod depends on Dev + Cms. Each
#   environment is optional — if it doesn't exist in Azure DevOps the
#   pipeline continues without failing.
#
# Test 2 (platform service lifecycle) requires Admin/sudo and is skipped
# in CI. Run it locally on a build VM with: dotnet run -- --test=2

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pool:
  name: BuildVM

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'

stages:

# -----------------------------------------------------------------------
# Stage 1: Build & Publish
#   Three parallel jobs — each publishes a self-contained win-x64
#   binary, zips it, and uploads as a pipeline artifact.
# -----------------------------------------------------------------------

- stage: Build
  displayName: 'Build & Publish Artifacts'
  jobs:

  # -- Publish Installer -----------------------------------------------
  - job: PublishInstaller
    displayName: 'Publish Installer (win-x64)'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore Installer'
      inputs:
        command: 'restore'
        projects: 'FreeServices.Installer/FreeServices.Installer.csproj'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Build] [Job: PublishInstaller] [Step: Publish Installer (win-x64)]"
        Write-Host "========================================"
        dotnet publish FreeServices.Installer/FreeServices.Installer.csproj --configuration $(buildConfiguration) --runtime win-x64 --self-contained true --output "$(Build.ArtifactStagingDirectory)/Installer"
        if ($LASTEXITCODE -ne 0) { Write-Error "dotnet publish failed"; exit $LASTEXITCODE }
        Write-Host "`n--- Contents of Installer output (recursive) ---"
        Get-ChildItem -Recurse "$(Build.ArtifactStagingDirectory)/Installer" | Select-Object FullName, Length
      displayName: 'Publish Installer'

    - task: ArchiveFiles@2
      displayName: 'Zip Installer'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/Installer'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/Installer.zip'

    - publish: $(Build.ArtifactStagingDirectory)/Installer.zip
      artifact: Installer
      displayName: 'Upload Installer artifact'

  # -- Publish Service -------------------------------------------------
  - job: PublishService
    displayName: 'Publish Service (win-x64)'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore Service'
      inputs:
        command: 'restore'
        projects: 'FreeServices.Service/FreeServices.Service.csproj'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Build] [Job: PublishService] [Step: Publish Service (win-x64)]"
        Write-Host "========================================"
        dotnet publish FreeServices.Service/FreeServices.Service.csproj --configuration $(buildConfiguration) --runtime win-x64 --self-contained true --output "$(Build.ArtifactStagingDirectory)/Service"
        if ($LASTEXITCODE -ne 0) { Write-Error "dotnet publish failed"; exit $LASTEXITCODE }
        Write-Host "`n--- Contents of Service output (recursive) ---"
        Get-ChildItem -Recurse "$(Build.ArtifactStagingDirectory)/Service" | Select-Object FullName, Length
      displayName: 'Publish Service'

    - task: ArchiveFiles@2
      displayName: 'Zip Service'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/Service'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/Service.zip'

    - publish: $(Build.ArtifactStagingDirectory)/Service.zip
      artifact: Service
      displayName: 'Upload Service artifact'

  # -- Publish TestMe --------------------------------------------------
  - job: PublishTestMe
    displayName: 'Publish TestMe (win-x64)'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore TestMe'
      inputs:
        command: 'restore'
        projects: 'FreeServices.TestMe/FreeServices.TestMe.csproj'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Build] [Job: PublishTestMe] [Step: Publish TestMe (win-x64)]"
        Write-Host "========================================"
        dotnet publish FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --runtime win-x64 --self-contained true --output "$(Build.ArtifactStagingDirectory)/TestMe"
        if ($LASTEXITCODE -ne 0) { Write-Error "dotnet publish failed"; exit $LASTEXITCODE }
        Write-Host "`n--- Contents of TestMe output (recursive) ---"
        Get-ChildItem -Recurse "$(Build.ArtifactStagingDirectory)/TestMe" | Select-Object FullName, Length
      displayName: 'Publish TestMe'

    - task: ArchiveFiles@2
      displayName: 'Zip TestMe'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/TestMe'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/TestMe.zip'

    - publish: $(Build.ArtifactStagingDirectory)/TestMe.zip
      artifact: TestMe
      displayName: 'Upload TestMe artifact'

# -----------------------------------------------------------------------
# Stage 2: Test
#   Pass A — "From Source": build from source and run tests via
#            dotnet run, capturing output to log files.
#   Pass B — "From Artifacts": download the pre-built Installer,
#            Service, and TestMe zips, extract them, and run
#            TestMe.exe against the shipped binaries (no recompile).
#   Logs from every test run are uploaded as the TestLogs artifact.
# -----------------------------------------------------------------------

- stage: Test
  displayName: 'Run Tests'
  dependsOn: Build
  jobs:

  # -- Pass A: Tests from source ---------------------------------------
  # Build from source, run tests 1/3/4 via dotnet run, tee to logs.

  - job: SourceTest1
    displayName: 'Source — Test 1 (Console Mode)'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: SourceTest1] [Step: Run Test 1 — Console Mode Lifecycle (from source)]"
        Write-Host "Command:"
        Write-Host "  dotnet run --project FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --no-build -- --test=1 --heartbeats=3 --interval=2 --timeout=60 --config=$(buildConfiguration) --servicedir=$(Build.SourcesDirectory)/FreeServices.Service"
        Write-Host "========================================"
        New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/TestLogs" | Out-Null
        dotnet run --project FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --no-build -- --test=1 --heartbeats=3 --interval=2 --timeout=60 --config=$(buildConfiguration) --servicedir=$(Build.SourcesDirectory)/FreeServices.Service 2>&1 | Tee-Object -FilePath "$(Build.ArtifactStagingDirectory)/TestLogs/source-test1.log"
        Write-Host "Exit code: $LASTEXITCODE"
        exit $LASTEXITCODE
      displayName: 'Run Test 1 — Console Mode (source)'

    - publish: $(Build.ArtifactStagingDirectory)/TestLogs
      artifact: TestLogs-Source-Test1
      displayName: 'Upload Test 1 logs'
      condition: always()

  - job: SourceTest3
    displayName: 'Source — Test 3 (Installer CLI)'
    continueOnError: true
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: SourceTest3] [Step: Run Test 3 — Installer CLI Configure/Remove (from source)]"
        Write-Host "Command:"
        Write-Host "  dotnet run --project FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --no-build -- --test=3 --config=$(buildConfiguration) --servicedir=$(Build.SourcesDirectory)/FreeServices.Service --installerdir=$(Build.SourcesDirectory)/FreeServices.Installer"
        Write-Host "========================================"
        New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/TestLogs" | Out-Null
        dotnet run --project FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --no-build -- --test=3 --config=$(buildConfiguration) --servicedir=$(Build.SourcesDirectory)/FreeServices.Service --installerdir=$(Build.SourcesDirectory)/FreeServices.Installer 2>&1 | Tee-Object -FilePath "$(Build.ArtifactStagingDirectory)/TestLogs/source-test3.log"
        Write-Host "Exit code: $LASTEXITCODE"
        exit $LASTEXITCODE
      displayName: 'Run Test 3 — Installer CLI (source)'

    - publish: $(Build.ArtifactStagingDirectory)/TestLogs
      artifact: TestLogs-Source-Test3
      displayName: 'Upload Test 3 logs'
      condition: always()

  - job: SourceTest4
    displayName: 'Source — Test 4 (Feature Showcase)'
    continueOnError: true
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: SourceTest4] [Step: Run Test 4 — CLI Feature Showcase (from source)]"
        Write-Host "Command:"
        Write-Host "  dotnet run --project FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --no-build -- --test=4 --config=$(buildConfiguration) --servicedir=$(Build.SourcesDirectory)/FreeServices.Service --installerdir=$(Build.SourcesDirectory)/FreeServices.Installer"
        Write-Host "========================================"
        New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/TestLogs" | Out-Null
        dotnet run --project FreeServices.TestMe/FreeServices.TestMe.csproj --configuration $(buildConfiguration) --no-build -- --test=4 --config=$(buildConfiguration) --servicedir=$(Build.SourcesDirectory)/FreeServices.Service --installerdir=$(Build.SourcesDirectory)/FreeServices.Installer 2>&1 | Tee-Object -FilePath "$(Build.ArtifactStagingDirectory)/TestLogs/source-test4.log"
        Write-Host "Exit code: $LASTEXITCODE"
        exit $LASTEXITCODE
      displayName: 'Run Test 4 — Feature Showcase (source)'

    - publish: $(Build.ArtifactStagingDirectory)/TestLogs
      artifact: TestLogs-Source-Test4
      displayName: 'Upload Test 4 logs'
      condition: always()

  # -- Pass B: Tests from pre-built artifacts --------------------------
  # Downloads the zipped artifacts from Stage 1, extracts them, and
  # runs TestMe.exe pointing at the shipped Installer + Service dirs.
  # This validates the published binaries work without source/SDK.

  - job: ArtifactTest
    displayName: 'Artifact — Tests from Pre-Built Binaries'
    dependsOn:
      - SourceTest1
      - SourceTest3
      - SourceTest4
    steps:

    - checkout: none

    - download: current
      artifact: Installer
      displayName: 'Download Installer artifact'

    - download: current
      artifact: Service
      displayName: 'Download Service artifact'

    - download: current
      artifact: TestMe
      displayName: 'Download TestMe artifact'

    - task: ExtractFiles@1
      displayName: 'Extract Installer'
      inputs:
        archiveFilePatterns: '$(Pipeline.Workspace)/Installer/Installer.zip'
        destinationFolder: '$(Pipeline.Workspace)/artifacts/Installer'

    - task: ExtractFiles@1
      displayName: 'Extract Service'
      inputs:
        archiveFilePatterns: '$(Pipeline.Workspace)/Service/Service.zip'
        destinationFolder: '$(Pipeline.Workspace)/artifacts/Service'

    - task: ExtractFiles@1
      displayName: 'Extract TestMe'
      inputs:
        archiveFilePatterns: '$(Pipeline.Workspace)/TestMe/TestMe.zip'
        destinationFolder: '$(Pipeline.Workspace)/artifacts/TestMe'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: ArtifactTest] [Step: List extracted artifacts]"
        Write-Host "========================================"
        Write-Host "--- Installer (recursive) ---"
        Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Installer" | Select-Object FullName, Length
        Write-Host "--- Service (recursive) ---"
        Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Service" | Select-Object FullName, Length
        Write-Host "--- TestMe (recursive) ---"
        Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/TestMe" | Select-Object FullName, Length
      displayName: 'List extracted artifacts'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: ArtifactTest] [Step: Run Test 1 from pre-built binaries]"
        $testMe = Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/TestMe" -Filter "FreeServices.TestMe.exe" | Select-Object -First 1 -ExpandProperty FullName
        $serviceDir = (Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Service" -Filter "FreeServices.Service.exe" | Select-Object -First 1).DirectoryName
        $installerDir = (Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Installer" -Filter "FreeServices.Installer.exe" | Select-Object -First 1).DirectoryName
        Write-Host "TestMe exe: $testMe"
        Write-Host "Service dir: $serviceDir"
        Write-Host "Installer dir: $installerDir"
        Write-Host "Command:"
        Write-Host "  $testMe --test=1 --heartbeats=3 --interval=2 --timeout=60 --config=$(buildConfiguration) --servicedir=$serviceDir --installerdir=$installerDir"
        Write-Host "========================================"
        if (!$testMe) { Write-Error "TestMe.exe not found under artifacts/TestMe"; exit 1 }
        if (!$serviceDir) { Write-Error "FreeServices.Service.exe not found under artifacts/Service"; exit 1 }
        New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/TestLogs" | Out-Null
        & $testMe --test=1 --heartbeats=3 --interval=2 --timeout=60 --config=$(buildConfiguration) --servicedir=$serviceDir --installerdir=$installerDir 2>&1 | Tee-Object -FilePath "$(Build.ArtifactStagingDirectory)/TestLogs/artifact-test1.log"
        Write-Host "Exit code: $LASTEXITCODE"
        exit $LASTEXITCODE
      displayName: 'Artifact Test 1 — Console Mode'

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: ArtifactTest] [Step: Run Test 3 from pre-built binaries]"
        $testMe = Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/TestMe" -Filter "FreeServices.TestMe.exe" | Select-Object -First 1 -ExpandProperty FullName
        $serviceDir = (Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Service" -Filter "FreeServices.Service.exe" | Select-Object -First 1).DirectoryName
        $installerDir = (Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Installer" -Filter "FreeServices.Installer.exe" | Select-Object -First 1).DirectoryName
        Write-Host "TestMe exe: $testMe"
        Write-Host "Service dir: $serviceDir"
        Write-Host "Installer dir: $installerDir"
        Write-Host "Command:"
        Write-Host "  $testMe --test=3 --config=$(buildConfiguration) --servicedir=$serviceDir --installerdir=$installerDir"
        Write-Host "========================================"
        if (!$testMe) { Write-Error "TestMe.exe not found under artifacts/TestMe"; exit 1 }
        & $testMe --test=3 --config=$(buildConfiguration) --servicedir=$serviceDir --installerdir=$installerDir 2>&1 | Tee-Object -FilePath "$(Build.ArtifactStagingDirectory)/TestLogs/artifact-test3.log"
        Write-Host "Exit code: $LASTEXITCODE"
        exit $LASTEXITCODE
      displayName: 'Artifact Test 3 — Installer CLI'
      continueOnError: true

    - powershell: |
        Write-Host "========================================"
        Write-Host "[Stage: Test] [Job: ArtifactTest] [Step: Run Test 4 from pre-built binaries]"
        $testMe = Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/TestMe" -Filter "FreeServices.TestMe.exe" | Select-Object -First 1 -ExpandProperty FullName
        $serviceDir = (Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Service" -Filter "FreeServices.Service.exe" | Select-Object -First 1).DirectoryName
        $installerDir = (Get-ChildItem -Recurse "$(Pipeline.Workspace)/artifacts/Installer" -Filter "FreeServices.Installer.exe" | Select-Object -First 1).DirectoryName
        Write-Host "TestMe exe: $testMe"
        Write-Host "Service dir: $serviceDir"
        Write-Host "Installer dir: $installerDir"
        Write-Host "Command:"
        Write-Host "  $testMe --test=4 --config=$(buildConfiguration) --servicedir=$serviceDir --installerdir=$installerDir"
        Write-Host "========================================"
        if (!$testMe) { Write-Error "TestMe.exe not found under artifacts/TestMe"; exit 1 }
        & $testMe --test=4 --config=$(buildConfiguration) --servicedir=$serviceDir --installerdir=$installerDir 2>&1 | Tee-Object -FilePath "$(Build.ArtifactStagingDirectory)/TestLogs/artifact-test4.log"
        Write-Host "Exit code: $LASTEXITCODE"
        exit $LASTEXITCODE
      displayName: 'Artifact Test 4 — Feature Showcase'
      continueOnError: true

    - publish: $(Build.ArtifactStagingDirectory)/TestLogs
      artifact: TestLogs-Artifacts
      displayName: 'Upload artifact test logs'
      condition: always()

# -----------------------------------------------------------------------
# Stage 3: Deploy (optional environments)
#   Downloads the pre-built Installer + Service artifacts from Stage 1.
#   No recompile — just extract and deploy. Each environment is optional
#   so missing environments won't crash the pipeline.
#   Prod runs only after Dev + Cms both succeed.
# -----------------------------------------------------------------------

- stage: Deploy
  displayName: 'Deploy to Environments'
  dependsOn: Test
  condition: succeeded()
  jobs:

  # -- Deploy to Dev (optional) ----------------------------------------
  - deployment: DeployDev
    displayName: 'Deploy to Dev'
    environment: 'Dev'
    continueOnError: true
    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: Installer
            displayName: 'Download Installer artifact'

          - download: current
            artifact: Service
            displayName: 'Download Service artifact'

          - task: ExtractFiles@1
            displayName: 'Extract Installer'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/Installer/Installer.zip'
              destinationFolder: '$(Pipeline.Workspace)/deploy/Installer'

          - task: ExtractFiles@1
            displayName: 'Extract Service'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/Service/Service.zip'
              destinationFolder: '$(Pipeline.Workspace)/deploy/Service'

          - script: |
              echo ========================================
              echo [Stage: Deploy] [Job: DeployDev] [Step: Deploy artifacts to Dev]
              echo ========================================
              echo --- Installer ---
              dir $(Pipeline.Workspace)\deploy\Installer
              echo --- Service ---
              dir $(Pipeline.Workspace)\deploy\Service
            displayName: 'List deployed artifacts — Dev'

  # -- Deploy to Cms (optional) ----------------------------------------
  - deployment: DeployCms
    displayName: 'Deploy to Cms'
    environment: 'Cms'
    continueOnError: true
    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: Installer
            displayName: 'Download Installer artifact'

          - download: current
            artifact: Service
            displayName: 'Download Service artifact'

          - task: ExtractFiles@1
            displayName: 'Extract Installer'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/Installer/Installer.zip'
              destinationFolder: '$(Pipeline.Workspace)/deploy/Installer'

          - task: ExtractFiles@1
            displayName: 'Extract Service'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/Service/Service.zip'
              destinationFolder: '$(Pipeline.Workspace)/deploy/Service'

          - script: |
              echo ========================================
              echo [Stage: Deploy] [Job: DeployCms] [Step: Deploy artifacts to Cms]
              echo ========================================
              echo --- Installer ---
              dir $(Pipeline.Workspace)\deploy\Installer
              echo --- Service ---
              dir $(Pipeline.Workspace)\deploy\Service
            displayName: 'List deployed artifacts — Cms'

  # -- Deploy to Prod (optional, gated on Dev + Cms) -------------------
  - deployment: DeployProd
    displayName: 'Deploy to Prod'
    environment: 'Prod'
    continueOnError: true
    dependsOn:
      - DeployDev
      - DeployCms
    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: Installer
            displayName: 'Download Installer artifact'

          - download: current
            artifact: Service
            displayName: 'Download Service artifact'

          - task: ExtractFiles@1
            displayName: 'Extract Installer'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/Installer/Installer.zip'
              destinationFolder: '$(Pipeline.Workspace)/deploy/Installer'

          - task: ExtractFiles@1
            displayName: 'Extract Service'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/Service/Service.zip'
              destinationFolder: '$(Pipeline.Workspace)/deploy/Service'

          - script: |
              echo ========================================
              echo [Stage: Deploy] [Job: DeployProd] [Step: Deploy artifacts to Prod]
              echo ========================================
              echo --- Installer ---
              dir $(Pipeline.Workspace)\deploy\Installer
              echo --- Service ---
              dir $(Pipeline.Workspace)\deploy\Service
            displayName: 'List deployed artifacts — Prod'
